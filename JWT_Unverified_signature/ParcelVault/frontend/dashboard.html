<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ParcelVault — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/">ParcelVault</a></div>
    <nav>
      <span id="who"></span>
      <a href="/staff/archive">Staff archive</a>
      <a href="#" id="logout">Logout</a>
    </nav>
  </header>
  <main class="page">
    <h2>Your shipments</h2>
    <table id="shipments">
      <thead>
        <tr><th>Tracking</th><th>Origin</th><th>Destination</th><th>Status</th><th>Updated</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <section id="archive-section" class="archive">
      <h3>Internal archive</h3>
      <div id="archive-msg" class="muted">Click "Staff archive" above to query restricted records.</div>
      <pre id="archive-data"></pre>
    </section>
  </main>
  <script src="/js/dashboard.js"></script>
</body>
</html>
